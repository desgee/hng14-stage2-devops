services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-128mb}
      --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 7s
      timeout: 5s
      start_period: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    networks:
      - internal
      - frontend_net
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    networks:
      - internal
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    networks:
      - frontend_net
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_URL: http://api:8000
      PORT: "3000"
      NODE_ENV: ${APP_ENV:-production}
    depends_on:
      api:
        condition: service_healthy

networks:
  internal:
    driver: bridge
    internal: true
  frontend_net:
    driver: bridge

volumes:
  redis_data: