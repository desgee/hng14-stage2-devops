<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    button { padding: 10px 20px; cursor: pointer; }
    #result { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 4px; }
    #jobs { margin-top: 20px; }
    .job { padding: 8px; border-bottom: 1px solid #ddd; }
    .job.error { color: #c0392b; }
  </style>
</head>
<body>
  <h1>Job Processor Dashboard</h1>
  <button onclick="submitJob()">Submit New Job</button>
  <div id="result"></div>
  <div id="jobs"></div>
  <script>
    async function submitJob() {
      try {
        const res = await fetch('/submit', { method: 'POST' });
        const data = await res.json();

        if (!res.ok || !data.job_id) {
          document.getElementById('result').innerText = `Error: ${data.error || 'Unknown error'}`;
          return;
        }

        document.getElementById('result').innerText = `Submitted: ${data.job_id}`;
        pollJob(data.job_id);
      } catch (err) {
        document.getElementById('result').innerText = `Network error: ${err.message}`;
      }
    }

    async function pollJob(id) {
      try {
        const res = await fetch(`/status/${id}`);
        const data = await res.json();

        // Stop polling on any error — including 404 / invalid ID responses
        if (!res.ok || data.error) {
          renderJob(id, `Error: ${data.error || 'Unknown error'}`, true);
          return;
        }

        renderJob(id, data.status, false);

        // Keep polling until the job reaches a terminal state
        if (data.status !== 'completed' && data.status !== 'failed') {
          setTimeout(() => pollJob(id), 2000);
        }
      } catch (err) {
        // Network-level failure — show error and stop polling
        renderJob(id, `Network error: ${err.message}`, true);
      }
    }

    function renderJob(id, status, isError = false) {
      let el = document.getElementById(id);
      if (!el) {
        el = document.createElement('div');
        el.className = 'job';
        el.id = id;
        document.getElementById('jobs').appendChild(el);
      }
      el.className = isError ? 'job error' : 'job';
      el.innerText = `Job ${id.substring(0, 8)}... — ${status}`;
    }
  </script>
</body>
</html>
