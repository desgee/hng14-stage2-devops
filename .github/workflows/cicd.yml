
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:       localhost:5000
  IMAGE_API:      localhost:5000/api
  IMAGE_WORKER:   localhost:5000/worker
  IMAGE_FRONTEND: localhost:5000/frontend
  PYTHON_VERSION: "3.12"
  NODE_VERSION:   "20"


## ============================================================================
## 1. LINT
## ============================================================================
jobs:
  lint:
    name: "1 · Lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python: flake8 ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: flake8 — API
        run: flake8 api/main.py --max-line-length=100 --extend-ignore=E203

      - name: flake8 — Worker
        run: flake8 worker/worker.py --max-line-length=100 --extend-ignore=E203

      # ── JavaScript: ESLint ────────────────────────────────────────────────
      # We use `npm run lint` (not npx) so ESLint resolves from the locally
      # installed node_modules. Using npx would download a fresh isolated copy
      # of ESLint that cannot find @eslint/js in the project's node_modules.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint — frontend
        working-directory: frontend
        run: npm run lint

      # ── Dockerfiles: hadolint ─────────────────────────────────────────────
      - name: Install hadolint
        run: |
          curl -sSL \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: hadolint — api/Dockerfile
        run: hadolint api/Dockerfile

      - name: hadolint — worker/Dockerfile
        run: hadolint worker/Dockerfile

      - name: hadolint — frontend/Dockerfile
        run: hadolint frontend/Dockerfile


## ============================================================================
## 2. TEST
## ============================================================================
  test:
    name: "2 · Unit Tests + Coverage"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: pip install -r api/tests/requirements-test.txt

      - name: Run pytest with coverage
        run: |
          PYTHONPATH=api pytest \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage-html/
          retention-days: 14


## ============================================================================
## 3. BUILD
## ============================================================================
  build:
    name: "3 · Build & Push Images"
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build & push — API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ github.sha }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push — Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:${{ github.sha }}
            ${{ env.IMAGE_WORKER }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Save git SHA for downstream jobs
        run: echo "${{ github.sha }}" > image-sha.txt

      - name: Upload SHA artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-sha
          path: image-sha.txt


## ============================================================================
## 4. SECURITY SCAN
## ============================================================================
  security-scan:
    name: "4 · Security Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download SHA artifact
        uses: actions/download-artifact@v4
        with:
          name: image-sha

      - name: Read SHA
        id: sha
        run: echo "value=$(cat image-sha.txt)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Load API image from cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          load: true
          tags: ${{ env.IMAGE_API }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha

      - name: Load Worker image from cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile
          load: true
          tags: ${{ env.IMAGE_WORKER }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha

      - name: Load Frontend image from cache
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          load: true
          tags: ${{ env.IMAGE_FRONTEND }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha

      - name: Trivy scan — API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ env.IMAGE_API }}:${{ steps.sha.outputs.value }}"
          format:         sarif
          output:         trivy-api.sarif
          severity:       CRITICAL
          exit-code:      "1"
          ignore-unfixed: true

      - name: Trivy scan — Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ env.IMAGE_WORKER }}:${{ steps.sha.outputs.value }}"
          format:         sarif
          output:         trivy-worker.sarif
          severity:       CRITICAL
          exit-code:      "1"
          ignore-unfixed: true

      - name: Trivy scan — Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ env.IMAGE_FRONTEND }}:${{ steps.sha.outputs.value }}"
          format:         sarif
          output:         trivy-frontend.sarif
          severity:       CRITICAL
          exit-code:      "1"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "."

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: "*.sarif"
          retention-days: 14


## ============================================================================
## 5. INTEGRATION TEST
## ============================================================================
  integration-test:
    name: "5 · Integration Test"
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Download SHA artifact
        uses: actions/download-artifact@v4
        with:
          name: image-sha

      - name: Read SHA
        id: sha
        run: echo "value=$(cat image-sha.txt)" >> "$GITHUB_OUTPUT"

      - name: Write runtime .env
        run: |
          cat > .env <<EOF
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_MAX_MEMORY=64mb
          APP_ENV=ci
          ALLOWED_ORIGIN=http://localhost:3000
          FRONTEND_PORT=3000
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Write compose override (use pre-built images)
        run: |
          SHA=${{ steps.sha.outputs.value }}
          cat > docker-compose.override.yml <<EOF
          services:
            api:
              build: null
              image: ${{ env.IMAGE_API }}:${SHA}
            worker:
              build: null
              image: ${{ env.IMAGE_WORKER }}:${SHA}
            frontend:
              build: null
              image: ${{ env.IMAGE_FRONTEND }}:${SHA}
          EOF

      - name: Load API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          load: true
          tags: ${{ env.IMAGE_API }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha

      - name: Load Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile
          load: true
          tags: ${{ env.IMAGE_WORKER }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha

      - name: Load Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          load: true
          tags: ${{ env.IMAGE_FRONTEND }}:${{ steps.sha.outputs.value }}
          cache-from: type=gha

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for all services to be healthy
        run: |
          TIMEOUT=120
          ELAPSED=0
          while true; do
            ALL_HEALTHY=$(docker compose ps --format json \
              | python3 -c "
          import sys, json
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          unhealthy = [s['Service'] for s in services
                       if s.get('Health','') not in ('healthy','')]
          print('no' if unhealthy else 'yes')
          ")
            if [[ "${ALL_HEALTHY}" == "yes" ]]; then
              echo "All services healthy after ${ELAPSED}s."
              break
            fi
            if [[ ${ELAPSED} -ge ${TIMEOUT} ]]; then
              echo "ERROR: services not healthy after ${TIMEOUT}s." >&2
              docker compose ps
              docker compose logs
              exit 1
            fi
            echo "Waiting... ${ELAPSED}s elapsed"
            sleep 5
            ELAPSED=$(( ELAPSED + 5 ))
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run integration test
        env:
          FRONTEND_URL: http://localhost:3000
          POLL_TIMEOUT: "30"
        run: python scripts/integration_test.py

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Capture compose logs
        if: always()
        run: docker compose logs --no-color > compose-logs.txt 2>&1 || true

      - name: Upload compose logs artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compose-logs
          path: compose-logs.txt
          retention-days: 7


## ============================================================================
## 6. DEPLOY
## ============================================================================
  deploy:
    name: "6 · Deploy (rolling)"
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Download SHA artifact
        uses: actions/download-artifact@v4
        with:
          name: image-sha

      - name: Read SHA
        id: sha
        run: echo "value=$(cat image-sha.txt)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Load images from cache
        run: |
          docker buildx build \
            --load --cache-from type=gha \
            -f api/Dockerfile \
            -t ${{ env.IMAGE_API }}:${{ steps.sha.outputs.value }} \
            -t ${{ env.IMAGE_API }}:latest \
            .

          docker buildx build \
            --load --cache-from type=gha \
            -f worker/Dockerfile \
            -t ${{ env.IMAGE_WORKER }}:${{ steps.sha.outputs.value }} \
            -t ${{ env.IMAGE_WORKER }}:latest \
            .

          docker buildx build \
            --load --cache-from type=gha \
            -f frontend/Dockerfile \
            -t ${{ env.IMAGE_FRONTEND }}:${{ steps.sha.outputs.value }} \
            -t ${{ env.IMAGE_FRONTEND }}:latest \
            .

      - name: Write .env for deploy
        run: |
          cat > .env <<EOF
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_MAX_MEMORY=64mb
          APP_ENV=production
          ALLOWED_ORIGIN=http://localhost:3000
          FRONTEND_PORT=3000
          EOF

      - name: Start simulated old production containers
        run: |
          docker network create prod-net || true

          docker run -d \
            --name api \
            --network prod-net \
            --health-cmd "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\"" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 3 \
            --health-start-period 10s \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            -e REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            -e ALLOWED_ORIGIN=http://localhost:3000 \
            ${{ env.IMAGE_API }}:latest

          echo "Old container started:"
          docker ps --filter "name=api"

      - name: Rolling deploy — API
        env:
          HEALTH_TIMEOUT: "60"
        run: |
          chmod +x scripts/rolling_deploy.sh
          bash scripts/rolling_deploy.sh \
            api \
            "${{ env.IMAGE_API }}:${{ steps.sha.outputs.value }}"

      - name: Rolling deploy — Worker
        env:
          HEALTH_TIMEOUT: "60"
        run: |
          bash scripts/rolling_deploy.sh \
            worker \
            "${{ env.IMAGE_WORKER }}:${{ steps.sha.outputs.value }}"

      - name: Rolling deploy — Frontend
        env:
          HEALTH_TIMEOUT: "60"
        run: |
          bash scripts/rolling_deploy.sh \
            frontend \
            "${{ env.IMAGE_FRONTEND }}:${{ steps.sha.outputs.value }}"

      - name: Verify deployment
        run: |
          echo "=== Containers after rolling deploy ==="
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"

          RUNNING_IMAGE=$(docker inspect api --format '{{.Config.Image}}' 2>/dev/null || echo "not found")
          EXPECTED="${{ env.IMAGE_API }}:${{ steps.sha.outputs.value }}"

          echo "Expected : ${EXPECTED}"
          echo "Running  : ${RUNNING_IMAGE}"

          if [[ "${RUNNING_IMAGE}" == "${EXPECTED}" ]]; then
            echo "Rolling deploy verified — new image is live."
          else
            echo "Image mismatch after deploy." >&2
            exit 1
          fi

      - name: Clean up containers
        if: always()
        run: |
          docker rm -f api api_new worker worker_new frontend frontend_new 2>/dev/null || true
          docker network rm prod-net 2>/dev/null || true
          echo "Cleanup complete."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Rolling deploy FAILED for commit ${{ github.sha }}."
          echo "::error::The old containers were left running — no downtime."